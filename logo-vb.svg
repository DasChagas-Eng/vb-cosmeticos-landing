<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#93E8F8"/>
      <stop offset="100%" stop-color="#72C6E6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="26" fill="url(#bg)"/>

  <g fill="white">
    <!-- V — left arm -->
    <polygon points="22,24 50,24 102,156 74,156"/>
    <!-- V — right arm (also B spine) -->
    <polygon points="102,156 130,156 158,24 130,24"/>

    <!-- B top hump — D-shape using cubic bezier -->
    <path d="M130,24 L158,24 C200,24 200,90 158,90 L130,90 Z"/>

    <!-- B bottom hump — larger D-shape using cubic bezier -->
    <path d="M130,100 L156,100 C202,100 202,174 156,174 L102,174 Z"/>
  </g>

  <!-- Cutouts to reveal gradient background -->
  <!-- Open interior of the V -->
  <polygon points="56,30 152,30 102,142" fill="url(#bg)"/>
  <!-- Notch where V meets B (top junction) -->
  <polygon points="130,24 158,24 148,50 118,50" fill="url(#bg)"/>
  <!-- Gap between B humps -->
  <rect x="130" y="88" width="72" height="14" rx="3" fill="url(#bg)"/>
</svg>
